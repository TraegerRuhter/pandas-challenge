# Builds the PLOT garden-planner PWA and deploys it to GitHub Pages.
# Site URL: https://traegerruhter.github.io/pandas-challenge/
#
# One-time setup: repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions".
name: Deploy garden-planner to Pages

on:
  push:
    branches: [main, claude/zealous-meitner-e7e3wl]
    paths: [garden-planner/**, .github/workflows/deploy-garden-planner.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    working-directory: garden-planner

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: garden-planner/package-lock.json
      - run: npm ci
      # The repo is served from /pandas-challenge/, so build with that base.
      - run: npm run build
        env:
          BASE_PATH: /pandas-challenge/
      # SPA fallback: GitHub Pages serves 404.html for unknown deep links;
      # an exact copy of index.html boots the app and the client router
      # resolves the path (§24 deep-link support).
      - run: cp dist/index.html dist/404.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true # turn on Pages (Actions source) without the manual toggle
      - uses: actions/upload-pages-artifact@v3
        with:
          path: garden-planner/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
